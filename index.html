<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>


<div class="leftPanel">

    <div class="odinStrip">
        <img src="images/image.png" class="logo" alt="Odin logo">
        <span>ODIN</span>
    </div>

    <div class="footer">
        Photo by
        <a href="https://hdqwalls.com/odin-thor-ragnarok-2017-5k-wallpaper">hqwalls</a>
    </div>

</div>


<div class="rightPanel">



    <div class="header">

        <p>
            This is not a real online service! You know you need something
            like this in your life to help you realize your deepest dreams.
            Sign up <em>now</em> to get started.
        </p>

        <p>
            You <em>know</em> you want to.
        </p>

    </div>

    <form>

        <fieldset>

            <div class="formCard">

                <legend>Let's Do This</legend>


                <div class="formGrid">


                    <div class="inputGroup">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>


                    <div class="inputGroup">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName">
                    </div>


                    <div class="inputGroup">
                        <label for="email">Email</label>
                        <input type="email" id="email">
                    </div>


                    <div class="inputGroup">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber">
                    </div>


                    <div class="inputGroup">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>


                    <div class="inputGroup">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>


                </div>

            </div>

        </fieldset>

        <button type="submit" id="createAccount">
            Create Account
        </button>

        <p>
            Already have an account?
            <a href="#">Log in</a>
        </p>


    </form>


</div>


</body>
</html>
